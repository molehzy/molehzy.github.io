        	margin: 10px 20px 20px 20px;
        	display: flex;
        	flex-wrap: wrap;
        	justify-content: center;
        	gap: 20px;
        }
        
        .links-container a {
        	display: inline-block;
        	padding: 10px 30px;
        	background-color: rgba(255, 255, 255, 0.5);
        	color: #0066FF;
        	font-weight: bold;
        	font-size: 24px;
        	text-decoration: none;
        	border-radius: 10px;
        	transition: all 0.5s;
        	letter-spacing: 2px;
        	text-shadow: 1px 1px 2px #000, -1px -1px 2px #000, 0 0 5px #000, 0 0 10px #000;
        }
        
        .links-container a:hover {
        	background-color: #0066FF;
        	color: #FFFFFFAA;
        	transition: all 0.5s;
        	text-shadow: 1px 1px 2px #000, -1px -1px 2px #000, 0 0 5px #000, 0 0 10px #000;
        }
        
        .bg-source {
            position: fixed;
            right: 15px;
            bottom: 15px;
            font-size: 10px;
            color: rgba(0, 0, 0, 0.5);
            text-decoration: none;
            z-index: 999;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.8);
            transition: color 0.3s ease;
        }
        
        .bg-source:hover {
            color: #0066FF;
            text-decoration: underline;
